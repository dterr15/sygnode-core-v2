version: '3.9'

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: sygnode
      POSTGRES_USER: sygnode
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sygnode_dev_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sygnode"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5433:5432"
    environment:
      DATABASE_URL: postgresql+asyncpg://sygnode:${DB_PASSWORD:-sygnode_dev_2026}@db:5432/sygnode
      DATABASE_URL_SYNC: postgresql://sygnode:${DB_PASSWORD:-sygnode_dev_2026}@db:5432/sygnode
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MAILGUN_API_KEY: ${MAILGUN_API_KEY:-}
      MAILGUN_DOMAIN: pxi.sygnode.cl
      GWS_CLIENT_EMAIL: ${GWS_CLIENT_EMAIL:-}
      GWS_PRIVATE_KEY: ${GWS_PRIVATE_KEY:-}
      GWS_IMPERSONATE_USER: ${GWS_IMPERSONATE_USER:-}
      GWS_PROJECT_ID: ${GWS_PROJECT_ID:-}
      GMAIL_WEBHOOK_TOKEN: ${GMAIL_WEBHOOK_TOKEN:-dev-hmac-token}
      CORS_ORIGINS: "http://localhost:3000,http://localhost:5173,https://sygnode-core-engine.pages.dev"
      DATAROOM_API_URL: ${DATAROOM_API_URL:-}
      DATAROOM_API_KEY: ${DATAROOM_API_KEY:-}
      DATAROOM_ENABLED: ${DATAROOM_ENABLED:-false}
      ENVIRONMENT: development
    volumes:
      - ./app:/app/app  # Hot reload

volumes:
  postgres_data:
